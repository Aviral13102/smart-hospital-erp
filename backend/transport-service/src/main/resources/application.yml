server:
  port: 8084

spring:
  application:
    name: transport-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_erp
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

logging:
  level:
    com.smarthospital.transport: DEBUG
    org.hibernate.SQL: DEBUG
